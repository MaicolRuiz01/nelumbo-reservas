services:

  postgres:
    image: postgres:16-alpine
    container_name: nelumbo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nelumbo_reservas
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d nelumbo_reservas"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - nelumbo-net

  # api-reservas y api-notificaciones se agregaran aqui
  # cuando dockericemos los servicios en la Fase 6.

volumes:
  postgres_data:
    driver: local

networks:
  nelumbo-net:
    driver: bridge
